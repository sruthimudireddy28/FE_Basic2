<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to get started</p>
    
    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="registerData.name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" [(ngModel)]="registerData.email" placeholder="name@example.com" required />
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" [(ngModel)]="registerData.password" placeholder="Create a password" required />
      </div>

      <div class="form-group">
        <label for="contact">Contact Number</label>
        <input type="tel" id="contact" name="contactNumber" [(ngModel)]="registerData.contactNumber" placeholder="Optional" />
      </div>

      <button type="submit" class="btn btn-primary">Register</button>
    </form>
  </div>
</div>
