<h2>Update Hotel</h2>

<!-- Show fields -->
  <input [(ngModel)]="hotel.name" name="name" placeholder="Name"><br>
  <input [(ngModel)]="hotel.location" name="location" placeholder="Location"><br>
  <input [(ngModel)]="hotel.address" name="address" placeholder="Address"><br>
  <input [(ngModel)]="hotel.city" name="city" placeholder="City"><br>
  <input [(ngModel)]="hotel.state" name="state" placeholder="State"><br>
  <input [(ngModel)]="hotel.country" name="country" placeholder="Country"><br>
  <input [(ngModel)]="hotel.zipCode" name="zipCode" placeholder="Zip Code"><br>
  <input [(ngModel)]="hotel.contactNumber" name="contactNumber" placeholder="Contact"><br>
  <input [(ngModel)]="hotel.email" name="email" placeholder="Email"><br>

<button (click)="updateHotel()">Update</button>
