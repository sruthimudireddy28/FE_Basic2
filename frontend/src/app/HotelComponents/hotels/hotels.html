<div class="hotels-container">
  <h1>Hotels</h1>
  <div class="cards-grid">
    @for(s of hotels; track s.hotelId) {
      <div class="hotel-card">
        @if (s.imageUrl) {
          <img [src]="s.imageUrl" alt="{{s.name}}" class="hotel-image">
        } @else {
          <div class="hotel-image-placeholder">No Image</div>
        }
        <div class="hotel-info">
          <h3>{{s.name}}</h3>
          <p class="location">{{s.city}}, {{s.state}}, {{s.country}}</p>
          <p class="description">{{s.description}}</p>
          <p class="rating">Rating: {{s.rating}}/5 ({{s.totalReviews}} reviews)</p>
          
          <div class="card-actions">
            <a [routerLink]="['/rooms-by-hotel', s.hotelId]" class="card-btn">View Rooms</a>
            <a [routerLink]="['/hotel-reviews', s.hotelId]" class="card-btn">Reviews</a>
            @if (isAdmin) {
              <a [routerLink]="['/update-hotel', s.hotelId]" class="card-btn">Edit</a>
              <a [routerLink]="['/delete-hotel', s.hotelId]" class="card-btn delete-btn">Delete</a>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
